---
stages:
  - lint
  - test
  - release

lint:score:
  stage: lint
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    UV_CACHE_DIR: .cache/uv
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - moo/**/*.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - mkdir -p public/badges public/lint
    - echo undefined > public/badges/lint.score
  script:
    - uv sync
    - uv run pylint --fail-under=8 --output-format=text moo | tee /tmp/pylint.txt
    - sed -n 's/^Your code has been rated at \([-0-9.]*\)\/.*/\1/p' /tmp/pylint.txt > public/badges/lint.score
  after_script:
    - uv run anybadge --overwrite --label lint --value=$(cat public/badges/lint.score) --file=public/badges/lint.svg 4=red 6=orange 8=yellow 10=green
    - |
      echo "Your score is: $(cat public/badges/lint.score)"
  artifacts:
    paths:
      - public
    when: always
  cache:
    paths:
      - .cache/uv

lint:codeclimate:
  stage: lint
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    UV_CACHE_DIR: .cache/uv
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - moo/**/*.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - uv sync
    - uv run pylint --fail-under=8 --output-format=pylint_gitlab.GitlabCodeClimateReporter moo > codeclimate.json
  artifacts:
    reports:
      codequality: codeclimate.json
    when: always
  cache:
    paths:
      - .cache/uv

lint:html:
  stage: lint
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    UV_CACHE_DIR: .cache/uv
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - moo/**/*.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - mkdir -p public/lint
  script:
    - uv sync
    - uv run pylint --fail-under=8 --output-format=pylint_gitlab.GitlabPagesHtmlReporter moo > public/lint/index.html
  artifacts:
    paths:
      - public
    when: always
  cache:
    paths:
      - .cache/uv

test:agent:
  stage: test
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    UV_CACHE_DIR: .cache/uv
    PYTHONUNBUFFERED: 1
    COVERAGE_FILE: .coverage.agent
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - moo/**/*.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - uv sync
    - uv run pytest -n auto moo/agent/tests/ --junitxml=junit-agent.xml --cov moo --cov-report term
  artifacts:
    when: always
    reports:
      junit: junit-agent.xml
    paths:
      - .coverage.agent
      - junit-agent.xml
  cache:
    paths:
      - .cache/uv

test:coverage:
  stage: test
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    UV_CACHE_DIR: .cache/uv
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - moo/**/*.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - job: test:agent
      artifacts: true
  script:
    - uv sync
    - uv run coverage combine .coverage.agent
    - uv run coverage report
    - uv run coverage xml
  coverage: /(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
  cache:
    paths:
      - .cache/uv

release:
  stage: release
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    GIT_COMMITTER_EMAIL: phil@bubblehouse.org
    GIT_COMMITTER_NAME: Phil Christensen
    GIT_AUTHOR_EMAIL: phil@bubblehouse.org
    GIT_AUTHOR_NAME: Phil Christensen
    GIT_CREDENTIALS: philchristensen:${GITLAB_TOKEN}
    UV_CACHE_DIR: .cache/uv
    PYPI_TOKEN: ${TWINE_PASSWORD}
  script:
    - npm install
    - ln -sf python3.11 /usr/bin/python3
    - npx semantic-release
  only:
    refs:
      - main
  cache:
    paths:
      - .cache/uv
      - node_modules/
