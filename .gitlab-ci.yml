---
stages:
  - lint
  - test
  - release

# Shallow-clone django-moo into the sibling path the local dev setup
# uses (``../django-moo``), so ``uv sync`` can resolve the editable
# path source declared in pyproject.toml.  Both moo-agent and
# django-moo contribute to the ``moo.*`` PEP 420 namespace package,
# so pylint and pytest need both trees side-by-side to resolve
# ``moo.core`` / ``moo.sdk`` / ``moo.bootstrap`` imports.
.clone_django_moo: &clone_django_moo >-
  if [ ! -d "$CI_PROJECT_DIR/../django-moo" ]; then
  git clone --depth 1
  https://gitlab.com/bubblehouse/django-moo.git
  "$CI_PROJECT_DIR/../django-moo";
  fi

lint:
  stage: lint
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    UV_CACHE_DIR: .cache/uv
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - moo/**/*.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - mkdir -p public/badges public/lint
    - echo undefined > public/badges/lint.score
    - *clone_django_moo
  script:
    - uv sync
    - uv run pylint --fail-under=8 --output-format=text moo | tee /tmp/pylint.txt
    - sed -n 's/^Your code has been rated at \([-0-9.]*\)\/.*/\1/p' /tmp/pylint.txt > public/badges/lint.score
    - uv run pylint --fail-under=8 --output-format=pylint_gitlab.GitlabCodeClimateReporter moo > codeclimate.json
    - uv run pylint --fail-under=8 --output-format=pylint_gitlab.GitlabPagesHtmlReporter moo > public/lint/index.html
  after_script:
    - uv run anybadge --overwrite --label lint --value=$(cat public/badges/lint.score) --file=public/badges/lint.svg 4=red 6=orange 8=yellow 10=green
    - |
      echo "Your score is: $(cat public/badges/lint.score)"
  artifacts:
    paths:
      - public
    reports:
      codequality: codeclimate.json
    when: always
  cache:
    paths:
      - .cache/uv

test:
  stage: test
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    UV_CACHE_DIR: .cache/uv
    PYTHONUNBUFFERED: 1
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - moo/**/*.py
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - *clone_django_moo
  script:
    - uv sync
    - uv run pytest -n auto moo/agent/tests/ --junitxml=junit-agent.xml --cov moo --cov-report term --cov-report xml
  coverage: /(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  artifacts:
    when: always
    reports:
      junit: junit-agent.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - junit-agent.xml
      - coverage.xml
  cache:
    paths:
      - .cache/uv

release:
  stage: release
  tags:
    - shacklyn
  image: registry.gitlab.com/bubblehouse/runner-base:1.3.1
  variables:
    GIT_COMMITTER_EMAIL: phil@bubblehouse.org
    GIT_COMMITTER_NAME: Phil Christensen
    GIT_AUTHOR_EMAIL: phil@bubblehouse.org
    GIT_AUTHOR_NAME: Phil Christensen
    GIT_CREDENTIALS: philchristensen:${GITLAB_TOKEN}
    UV_CACHE_DIR: .cache/uv
    PYPI_TOKEN: ${TWINE_PASSWORD}
  script:
    - npm install
    - ln -sf python3.11 /usr/bin/python3
    - npx semantic-release
  only:
    refs:
      - main
  cache:
    paths:
      - .cache/uv
      - node_modules/
