SESSION="makers"
AGENTS=(foreman warden stocker tinker quartermaster joiner)
STALE_SECONDS=1800
TOKEN_CHAIN="stocker,tinker,quartermaster,joiner,warden"

pre_start() {
  # Clear the tradesmen board topic so stale Mason room lists don't
  # influence Joiner/Tinker when Mason is not part of this run.
  docker compose -f "$HOME/Workspace/bubblehouse/django-moo/compose.yml" exec -T webapp bin/python src/manage.py shell -c "
from moo.core.models import Object
board = Object.objects.filter(name='The Dispatch Board').first()
if board:
    topics = board.get_property('topics') or {}
    if 'tradesmen' in topics:
        topics.pop('tradesmen')
        board.set_property('topics', topics)
        print('Cleared tradesmen topic from The Dispatch Board.')
    else:
        print('No tradesmen topic found — board already clean.')
else:
    print('The Dispatch Board not found — skipping.')
"
}
