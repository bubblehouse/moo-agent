SESSION="tradesmen"
AGENTS=(foreman mason tinker joiner harbinger stocker)
# 1800s (30 min) accommodates idle workers waiting for the token chain
# to cycle back to them. With 5 workers and ~5-8 min per pass, a worker
# can legitimately be quiet for ~25 min between turns. Stuck *active*
# workers are caught much sooner by Foreman's stall_timeout_seconds=180
# (3 min) which re-pages them; this threshold is the secondary backup
# for cases where Foreman itself has died or otherwise can't re-page.
STALE_SECONDS=1800
