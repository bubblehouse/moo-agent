---
mansion: Mansion of Curiosities
rooms:
  - name: The Laboratory
    description: A cavernous laboratory filled with gadgetry of every kind, this seems like a dumping ground for every piece of dusty forgotten equipment
      a mad scientist might require.
    exits:
      north: Greenhouse
      east: Power Station
      south: Storage
    objects:
      - name: dusty centrifuge
        parent: $thing
        description: A heavy, metal machine covered in a fine layer of grey dust.
      - name: bubbling beaker
        parent: $container
        description: A glass vessel containing a neon-green liquid that pulses with light.
    npcs: []
  - name: Greenhouse
    description: A lush, humid dome of glass and iron, overflowing with strange flora.
    exits:
      south: The Laboratory
    objects:
      - name: exotic fern
        parent: $thing
        description: A plant with iridescent leaves that seem to move on their own.
    npcs: []
  - name: Power Station
    description: An industrial chamber humming with high-voltage energy and the smell of ozone.
    exits:
      west: The Laboratory
      east: Generator Room
    objects:
      - name: transformer
        parent: $furniture
        description: A massive, boxy hunk of iron and copper coils.
    npcs: []
  - name: Storage
    description: A cluttered basement filled with crates and dusty relics from the mansion's past.
    exits:
      north: The Laboratory
    objects:
      - name: old wooden crate
        parent: $container
        description: A splintering box that looks like it hasn't been opened in decades.
    npcs: []
  - name: Generator Room
    description: A loud, vibrating room dominated by a massive diesel engine.
    exits:
      west: Power Station
    objects:
      - name: fuel canister
        parent: $thing
        description: A heavy metal jug filled with pungent diesel.
    npcs: []
