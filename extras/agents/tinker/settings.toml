[ssh]
host = "localhost"
port = 8022
user = "tinker+bijaz.local"
password = "Pw9cX3mZrT6y"
key_file = ""           # path to private key file; leave empty to use password

[llm]
# provider = "anthropic"
# model = "claude-opus-4-7"
# api_key_env = "ANTHROPIC_API_KEY"
provider = "lm_studio"
model = "qwen3.5-9b-mlx"
base_url = "http://localhost:1234/v1"

[agent]
command_rate_per_second = 1.0       # leaky bucket rate; increase cautiously
memory_window_lines = 20            # lines of short-term memory fed to LLM
max_tokens = 4096                   # must accommodate multi-tool responses
idle_wakeup_seconds = 0             # disabled: only wake on page (token passing protocol)

# Gemma 4 sampling — DeepMind production defaults (prevents MoE repetition loops)
temperature = 0.7
top_p = 0.8
top_k = 20
repeat_penalty = 1.05
min_p = 0.03
instructor_retries = 3
