      description: >
        A half-eaten box of MomCorp brand chocolates, the kind with the corporate logo
        stamped into each piece. The box is fresh — the sell-by date is next week. The
        operator's chair is worn to the shape of someone who spends considerable time here.
      aliases: [chocolates, candy, box, momcorp chocolates]
