    - name: glowing mushroom __hash_suffix__
      description: >
        A cluster of bioluminescent fungi growing from the tunnel wall, providing the
        dim blue-green light that makes this place navigable. Up close the glow is
        hypnotic. The mushrooms are warm to the touch. A mutant child has drawn a smiley
        face on the largest cap in blue chalk.
      aliases: [mushroom, fungi, glowing fungi, bioluminescent mushroom]
