---
# Burns Manor — Object Definitions
#
# parent: $furniture  → immovable, players can sit/stand (automatic verbs)
# parent: $thing      → default, portable unless moveto verb overridden
# obvious: true       → appears in room contents listing when players `look`
# obvious: false      → hidden, discovered by exploration (default)
#
# Object section keys are CLEAN room names (no __hash_suffix__).
# Object name: fields include __hash_suffix__.

objects:

  # ── GRAND FOYER ───────────────────────────────────────────────────────

  Grand Foyer:
    - name: crystal chandelier __hash_suffix__
      description: >
        An enormous chandelier of Austrian crystal, large enough that its replacement cost
        would fund Springfield's school district for a year. Mr. Burns reportedly had it
        installed to "remind guests of their smallness."
      aliases: [chandelier, lights, crystal]
      obvious: true

    - name: suit of armor __hash_suffix__
      description: >
        Full Gothic plate armor, polished to a mirror finish. A small placard reads
        "15th century, Milanese. Do not touch. The last person who touched it is no
        longer with us."
      aliases: [armor, armour, knight]
      obvious: true
      quantity: 2

    - name: oil portrait of Burns __hash_suffix__
      description: >
        A massive oil portrait depicting a young Mr. Burns — perhaps forty years old,
        which places the painting somewhere around 1890. He is shown holding a falcon
        and gazing at something just off-canvas with barely concealed contempt. A small
        brass plate reads: "Charles Montgomery Burns, 1886 — ?"
      aliases: [portrait, oil portrait, burns portrait]
      obvious: true

    - name: brass doorbell __hash_suffix__
      description: >
        An ornate brass doorbell mounted beside the entrance. A small card reads "Ring
        for Smithers." Below that, in smaller text: "Do not ring for Burns."
      aliases: [doorbell, bell]
      obvious: true

    - name: Persian rug __hash_suffix__
      description: >
        A hand-knotted carpet of extraordinary antiquity. The pattern depicts hunting
        scenes involving animals that no longer exist. It is warm underfoot, which is
        strange for something this old.
      aliases: [rug, carpet]

  # ── THE PORTRAIT HALL ─────────────────────────────────────────────────

  The Portrait Hall:
    - name: ancestor portrait gallery __hash_suffix__
      description: >
        Eleven oil portraits spanning four centuries of the Burns family line. Each face
        is a variation on the same theme: pale, angular, perpetually dissatisfied. The
        nameplates read names like "Cornelius Burns, 1743" and "Edmund Burns, 1801 —
        Baron of Certain Things." The most recent addition is simply labeled "C.M. Burns,
        1886 — ongoing." The question mark has been removed. It is unclear when.
      aliases: [portraits, paintings, ancestors, family portraits, gallery wall]
      obvious: true

    - name: velvet settee __hash_suffix__
      description: >
        A long settee upholstered in deep burgundy velvet, placed beneath the portrait
        gallery for visitors who require seating before they can continue. The upholstery
        is original. The cushioning has been replaced twice — both times after incidents
        not discussed openly.
      aliases: [settee, bench, sofa]
      obvious: true
      parent: $furniture
      quantity: 2

    - name: gilt mirror __hash_suffix__
      description: >
        A floor-to-ceiling mirror in a frame of absurd gilt complexity, depicting vines,
        cherubs, and what may be a stock certificate. The glass is old and slightly wavy,
        adding a decade to anyone reflected in it.
      aliases: [mirror, looking glass]
      obvious: true

    - name: bronze statuette __hash_suffix__
      description: >
        A small bronze figure of a man in a top hat, one foot raised in triumph atop a
        prone form. The prone form appears to be a union organizer. The statuette is
        surprisingly heavy for its size.
      aliases: [statuette, bronze, figure]

    - name: battle standard __hash_suffix__
      description: >
        A moth-eaten silk battle standard mounted in a brass frame, bearing a crest
        featuring a lion devouring a smaller lion. The motto beneath reads, in Latin:
        "Quia Possum." ("Because I Can.")
      aliases: [standard, banner, flag, crest]

  # ── THE BALLROOM ──────────────────────────────────────────────────────

  The Ballroom:
    - name: ballroom chandeliers __hash_suffix__
      description: >
        Two enormous chandeliers of Bohemian crystal hanging dark and unlit above the
        dance floor. At full illumination they would produce an estimated 40,000 candle-
        power. They have not been lit since a state dinner in 1987, the guest list of
        which has been redacted.
      aliases: [chandelier, chandeliers, ballroom lights, crystal lights]
      obvious: true

    - name: grand piano __hash_suffix__
      description: >
        A nine-foot Steinway concert grand in ebony lacquer, sitting on a low dais at
        the far end of the ballroom. The keys are yellowed but intact. The lid is up.
        Sheet music on the stand appears to be a composition by Burns himself, titled
        "Excellent! A Waltz for One." It is in a minor key.
      aliases: [piano, steinway, grand piano, keyboard]
      obvious: true
      parent: $furniture

    - name: orchestra pit railing __hash_suffix__
      description: >
        A polished brass railing bordering the sunken orchestra pit. The music stands
        below still hold their sheets, as if the orchestra stepped out momentarily
        thirty years ago and simply did not return.
      aliases: [railing, pit railing, orchestra pit]
      obvious: true

    - name: party streamer __hash_suffix__
      description: >
        A single dusty paper streamer draped across one of the music stands. It appears
        to have been there since the last actual party. The color has faded beyond
        determination.
      aliases: [streamer, paper streamer]

    - name: folded tablecloth __hash_suffix__
      description: >
        A folded banquet tablecloth in ivory damask, still in its laundry press folds,
        sitting on a card table near the entrance. It has not been unfolded. There is
        no table here to put it on.
      aliases: [tablecloth, cloth, linen]

  # ── THE GALLERY ───────────────────────────────────────────────────────

  The Gallery:
    - name: The Concert __hash_suffix__
      description: >
        Johannes Vermeer's "The Concert," circa 1664. Oil on canvas. Missing from the
        Isabella Stewart Gardner Museum since March 18, 1990. A card beneath it reads
        "Private Collection — not for loan, not for return." The painting is in
        immaculate condition.
      aliases: [vermeer, concert, masterwork, flemish painting]
      obvious: true

    - name: velvet rope __hash_suffix__
      description: >
        A red velvet rope on brass stanchions separating the viewer from the Vermeer.
        A sign on the rope reads "Do Not Cross." A second sign reads "This Means You,
        Specifically."
      aliases: [rope, stanchion, barrier]
      obvious: true

    - name: bust of Napoleon __hash_suffix__
      description: >
        A marble bust of Napoleon Bonaparte, approximately life-sized. He appears to be
        looking slightly upward, possibly to compensate. A small plaque reads
        "A personal hero — CMB."
      aliases: [napoleon, bust, marble bust]
      obvious: true

    - name: gallery camera __hash_suffix__
      description: >
        A small surveillance camera mounted in the corner of the gallery ceiling. Its red
        light blinks in what seems like a deliberate pattern. You have the distinct feeling
        it is winking at you.
      aliases: [camera, security camera, cctv]

    - name: empty display case __hash_suffix__
      description: >
        A glass display case on a marble plinth, conspicuously empty. A label inside
        reads: "Mona Lisa — Leonardo da Vinci, 1503 — on extended loan." There is no
        institution listed.
      aliases: [display case, empty case]

  # ── THE TROPHY ROOM ───────────────────────────────────────────────────

  The Trophy Room:
    - name: rhinoceros head __hash_suffix__
      description: >
        A full-mount black rhinoceros head, mounted high on the east wall. The placard
        reads "Diceros bicornis — acquired Kenya, 1962. The regulations were different
        then. — CMB." The horn has been polished.
      aliases: [rhino, rhinoceros, rhino head]
      obvious: true

    - name: mounted bear head __hash_suffix__
      description: >
        A large grizzly bear head mounted above the north wall mantelpiece, its jaws
        open in a theatrical snarl. Unlike the other trophies, it is mounted on a
        hinged panel rather than directly to the wall — the join is subtle, but
        visible on close inspection. The bear's expression, uniquely, is one of mild
        embarrassment rather than aggression.
      aliases: [bear, bear head, grizzly, mounted bear]
      obvious: true

    - name: tiger skin rug __hash_suffix__
      description: >
        A full Bengal tiger skin spread across the center of the floor, glass eyes still
        in the head mount. The placard at the tail reads "Panthera tigris tigris —
        personal collection, 1937. Taken fair and square." The definition of
        "fair and square" is not elaborated upon.
      aliases: [tiger, tiger rug, tiger skin, rug]
      obvious: true
      parent: $furniture

    - name: trophy display case __hash_suffix__
      description: >
        A mahogany and glass display case holding smaller trophies from various hunts:
        a shark's jaw, a narwhal tusk, a set of tusks too small to be elephant tusks
        and too large to be reasonable. Each item has a small handwritten card.
      aliases: [trophy case, display case, trophies, case]
      obvious: true

    - name: taxidermy placard __hash_suffix__
      description: >
        A framed card mounted beside the rhinoceros head summarizing Mr. Burns' hunting
        philosophy: "Nature is a thing one masters, not a thing one observes. Any
        ecologist who tells you otherwise has never faced a wounded bull elephant alone
        at dusk in the Serengeti. I have. Good morning."
      aliases: [placard, card, philosophy, quote]

  # ── THE BILLIARD ROOM ─────────────────────────────────────────────────

  The Billiard Room:
    - name: billiard table __hash_suffix__
      description: >
        A full-sized slate-bed billiard table in Honduran mahogany, covered in green
        baize of tournament grade. Four balls remain on the table from a game played
        at some unknown point. The cue ball is against the rail. The game appears to
        have concluded inconclusively.
      aliases: [pool table, table, billiards, slate table]
      obvious: true
      parent: $furniture

    - name: drinks cabinet __hash_suffix__
      description: >
        A walnut drinks cabinet holding cut-glass decanters of scotch, brandy, and
        something labeled only with a year: 1847. The glasses are etched with the
        Burns crest. A small card reads "Help yourself. He never does."
      aliases: [cabinet, bar, drinks, decanters, liquor cabinet]
      obvious: true

    - name: cue rack __hash_suffix__
      description: >
        A wall-mounted rack holding twelve billiard cues, each engraved "CMB" at the
        butt end. They are identical, which is either obsessive or efficient. One is
        missing.
      aliases: [rack, cues, billiard cues, pool cues]
      obvious: true

    - name: fox hunting print __hash_suffix__
      description: >
        A large framed print depicting Mr. Burns on horseback in full hunting kit,
        the fox cornered against a stone wall in the background. The fox appears to
        have given up. The horse appears to share its feelings.
      aliases: [print, hunting print, fox hunt, painting]
      obvious: true

    - name: chalk cube __hash_suffix__
      description: >
        A small blue billiard chalk cube on the rail of the table, worn down to about
        two-thirds its original size. It has left a faint blue ring on the polished wood.
      aliases: [chalk, billiard chalk]

    - name: billiard trophy __hash_suffix__
      description: >
        A small silver trophy on the drinks cabinet inscribed "Burns Invitational 1964 —
        First Place." There is no second-place trophy visible. The invitational, from
        context, may have had only one participant.
      aliases: [trophy, silver trophy]

  # ── THE DRAWING ROOM ──────────────────────────────────────────────────

  The Drawing Room:
    - name: chaise longue __hash_suffix__
      description: >
        A silk-upholstered chaise longue in imperial gold, reportedly seized from a
        Napoleonic field marshal's personal quarters. It is extraordinarily comfortable,
        which feels wrong.
      aliases: [chaise, lounge, couch, sofa]
      obvious: true
      parent: $furniture

    - name: grandfather clock __hash_suffix__
      description: >
        A towering grandfather clock in figured walnut. It ticks with metronomic
        precision but shows a time that does not match any timezone. The face is painted
        with allegorical scenes of industry crushing labor.
      aliases: [clock, grandfather clock, tall clock]
      obvious: true

    - name: marble fireplace __hash_suffix__
      description: >
        A fireplace of Carrara marble, large enough to roast an ox. Currently unlit,
        as Mr. Burns keeps the mansion at 58 degrees to "build character." The mantle
        holds a row of commemorative plates from historical moments Burns personally
        witnessed.
      aliases: [fireplace, fire, hearth, mantle]
      obvious: true

    - name: Faberge egg __hash_suffix__
      description: >
        A jeweled egg by Carl Faberge, displayed in a temperature-controlled case.
        A card notes it was "gifted" by the Romanovs in 1912. The quotation marks
        are handwritten.
      aliases: [egg, faberge egg, faberge, jeweled egg]
      obvious: true

    - name: iron poker __hash_suffix__
      description: >
        A fireplace poker monogrammed "CMB" in gothic script. The weight of it suggests
        it has seen uses beyond fire-tending.
      aliases: [poker, fire poker]

    - name: commemorative plate __hash_suffix__
      description: >
        One of a row of decorative plates on the mantle. This one commemorates "The
        Dissolution of the Standard Oil Trust, 1911 — A Dark Day. — CMB." The artwork
        depicts a sunrise, which seems like a mismatch.
      aliases: [plate, commemorative, mantle plate]

  # ── THE DINING ROOM ───────────────────────────────────────────────────

  The Dining Room:
    - name: banquet table __hash_suffix__
      description: >
        A mahogany banquet table running the full length of the room — some forty feet.
        Forty-nine of the fifty place settings are perpetually laid but never used.
        The surface has been polished daily for decades; the wood has absorbed the
        reflection of empty candles long enough that it seems to glow from within.
      aliases: [table, dining table, long table, banquet]
      obvious: true
      parent: $furniture

    - name: head chair __hash_suffix__
      description: >
        The chair at the head of the table is somewhat larger than the others and features
        a carved high back bearing the Burns family crest. It is upholstered in leather.
        The seat shows wear in exactly one spot.
      aliases: [throne, head chair, carved chair, armchair, main chair]
      obvious: true
      parent: $furniture

    - name: silver candelabra __hash_suffix__
      description: >
        A seven-armed silver candelabra in the center of the table, lit, despite no one
        having dined here recently. The wax has been replaced so frequently it is fresh.
        Someone comes in here and does this.
      aliases: [candelabra, candles, silver candelabra]
      obvious: true
      quantity: 2

    - name: mystery portrait __hash_suffix__
      description: >
        A formal portrait above the sideboard depicting a woman in Edwardian dress,
        unnamed on the frame. She resembles no one in the other portraits. She is
        smiling slightly, which is also unusual. No one on the staff will discuss it.
      aliases: [portrait, woman portrait, unnamed portrait, mysterious portrait]
      obvious: true

    - name: servants bell __hash_suffix__
      description: >
        A small brass bell on the sideboard, for summoning kitchen staff. The bell
        is shiny from use. The kitchen is a short walk away, but the bell appears to
        be a matter of principle.
      aliases: [bell, servant bell, call bell]

    - name: napkin ring __hash_suffix__
      description: >
        A sterling silver napkin ring, one of fifty. This one is monogrammed "CMB."
        All of them are monogrammed "CMB."
      aliases: [napkin ring, ring, silver ring]

  # ── THE KITCHEN ───────────────────────────────────────────────────────

  The Kitchen:
    - name: cast iron range __hash_suffix__
      description: >
        A six-burner cast iron range of Edwardian manufacture, occupying the entire north
        wall. It has never been turned off. The burners are set at varying levels: two on
        high, two on medium, two on "threatening." The manufacturer's plate reads
        "Falconer & Sons, Sheffield, 1908."
      aliases: [range, stove, oven, cooker, iron range]
      obvious: true
      parent: $furniture

    - name: butcher block __hash_suffix__
      description: >
        A butcher block work surface of end-grain maple, worn smooth by decades of use.
        It is scrubbed white and smells of lemon and bleach. Several knives are arranged
        in a magnetic rack along its edge, each one impeccably sharp.
      aliases: [butcher block, chopping block, work surface, block]
      obvious: true
      parent: $furniture

    - name: hanging copper pots __hash_suffix__
      description: >
        A ceiling rack holding sixteen copper pots and pans in descending order of size,
        each polished to a mirror shine. The smallest is for sauces; the largest could
        plausibly accommodate a person, though nothing in the kitchen's history suggests
        this has been its use.
      aliases: [pots, copper pots, pans, cookware, hanging pots]
      obvious: true

    - name: recipe book __hash_suffix__
      description: >
        A handwritten recipe book in a worn leather binding. The recipes are in French.
        Several pages are annotated in a cramped hand: "Too much flavor — CMB," and
        "Reduce portion. He said nothing but I could tell. — G."
      aliases: [recipe book, cookbook, recipes, book]

    - name: industrial cockroach __hash_suffix__
      description: >
        An improbably large cockroach near the base of the range, moving with the
        unhurried confidence of something that has outlived everything else in this
        building. It regards you without apparent concern.
      aliases: [cockroach, roach, bug, insect]

  # ── THE WINE CELLAR ───────────────────────────────────────────────────

  The Wine Cellar:
    - name: wine rack __hash_suffix__
      description: >
        A floor-to-ceiling mahogany rack holding hundreds of bottles, each labeled in a
        cramped Victorian hand. The oldest vintage visible is 1843. Several bottles are
        marked with small skulls, meaning unclear.
      aliases: [rack, bottles, wine bottles, wine]
      obvious: true

    - name: taxidermied dodo __hash_suffix__
      description: >
        A remarkably preserved Dodo bird, mounted on a mahogany base. The placard reads
        "Raphus cucullatus — extinct since 1681. Personal collection, CMB." The glass
        eyes retain an air of mild surprise.
      aliases: [dodo, bird, extinct bird]
      obvious: true

    - name: taxidermied saber-toothed tiger __hash_suffix__
      description: >
        A full-mount Smilodon, fangs polished to a gleam. The placard notes acquisition
        in "the early years." The pose suggests it was mid-leap when acquired.
      aliases: [saber tooth, sabertooth, tiger, smilodon]
      obvious: true

    - name: taxidermied T-Rex __hash_suffix__
      description: >
        A full Tyrannosaurus Rex skull mounted on the far wall, jaws open wide enough to
        swallow a Buick. A brass placard reads: "Tyrannosaurus rex — Cretaceous, approx.
        66 million years old. Acquired 1886. Do not ask. — CMB." The teeth have been
        individually polished.
      aliases: [t-rex, rex, dinosaur, tyrannosaurus, skull, t rex]
      obvious: true

    - name: trespasser skeleton __hash_suffix__
      description: >
        A skeleton in tattered clothing, seated against the north wall with a wine glass
        still in hand. A card reads: "Trespasser — 1987. The Bordeaux was wasted on
        him. — CMB." The wall behind the skeleton is noticeably cooler than the others,
        and the stone around the base seems to have been disturbed.
      aliases: [skeleton, bones, trespasser, remains]
      obvious: true

    - name: cellar display case __hash_suffix__
      description: >
        A temperature-controlled glass case at eye level holding three exceptional
        bottles: a $60,000 Chateau Margaux, a pre-Prohibition Madeira, and a bottle
        bearing no label, only a wax seal in deep burgundy.
      aliases: [display case, special case, case, exceptional bottles]

  # ── MR. BURNS' STUDY ──────────────────────────────────────────────────

  Mr. Burns' Study:
    - name: mahogany desk __hash_suffix__
      description: >
        A desk of such imposing scale that it was almost certainly assembled inside the
        room. Its surface is bare except for a single red button, a brass intercom,
        and a stack of manila dossiers. Each dossier is labeled with an employee name.
      aliases: [desk]
      obvious: true

    - name: leather chair __hash_suffix__
      description: >
        Mr. Burns' throne — a high-backed leather chair that swivels to face the desk
        or the window with equal menace. The leather is cracked with age. Sitting in it
        makes you feel briefly omnipotent.
      aliases: [chair, throne, burns chair]
      obvious: true
      parent: $furniture

    - name: hounds button __hash_suffix__
      description: >
        A large red button mounted on a polished brass base, sitting on the corner of
        the desk. A small engraved label reads: "THE HOUNDS." The button shows signs
        of frequent use.
      aliases: [button, red button, release button, hounds]
      obvious: true

    - name: brass intercom __hash_suffix__
      description: >
        A vintage intercom system, heavy brass with a single large button labeled
        "SMITHERS." There is no other button.
      aliases: [intercom]
      obvious: true

    - name: poker portrait __hash_suffix__
      description: >
        A large oil painting rendered in the style of Coolidge's "Dogs Playing Poker,"
        except all the dogs have been replaced with Mr. Burns at various ages.
        He is winning in every panel.
      aliases: [dog portrait, poker painting, coolidge portrait]
      obvious: true

    - name: dossier pile __hash_suffix__
      description: >
        A stack of manila folders, each labeled with an employee name. The top one reads
        "Simpson, Homer J." in red ink, underlined three times. The folder is considerably
        thicker than the others.
      aliases: [dossiers, files, folders, dossier, file, folder]

  # ── THE SURVEILLANCE ROOM ─────────────────────────────────────────────

  The Surveillance Room:
    - name: bank of monitors __hash_suffix__
      description: >
        Dozens of flickering CRT monitors covering the entire north wall, each streaming
        live footage from a hidden camera somewhere in Springfield. Several are labeled
        with tape: "742 Evergreen," "Kwik-E-Mart," "Plant Floor 3,"
        "Quimby's Bedroom (CONFIDENTIAL)."
      aliases: [monitors, screens, televisions, tvs, monitor, screen]
      obvious: true

    - name: control console __hash_suffix__
      description: >
        A console of bewildering complexity: hundreds of switches, dials, levers, and
        buttons with either cryptic labels or no labels at all. Several switches are taped
        down with warnings reading "DO NOT TOGGLE — Springfield's water supply."
      aliases: [console, controls, control panel, panel]
      obvious: true

    - name: filing cabinet __hash_suffix__
      description: >
        A four-drawer metal cabinet. Each drawer is labeled by Springfield address.
        The drawer for 742 Evergreen Terrace is considerably thicker than the others
        and has a sticky note reading "Ongoing."
      aliases: [cabinet, file cabinet, files]
      obvious: true

    - name: bowl of fruit __hash_suffix__
      description: >
        A decorative bowl containing a wax apple, a wax pear, and one actual banana gone
        entirely black. The bowl has not been touched in what appears to be several
        administrations.
      aliases: [fruit, bowl, wax fruit]

  # ── THE MONKEY CHAMBER ────────────────────────────────────────────────

  The Monkey Chamber:
    - name: one thousand typewriters __hash_suffix__
      description: >
        Identical manual typewriters, each occupied by a Capuchin monkey in a miniature
        necktie. The cacophony is extraordinary. Several monkeys pause to regard you
        with what may be professional jealousy.
      aliases: [typewriters, typewriter, monkeys, monkey]
      obvious: true

    - name: manuscript pile __hash_suffix__
      description: >
        Reams of paper stacked floor to ceiling near the chamber door, representing the
        ongoing scholarly output of the monkey experiment. Spot-checking reveals mostly
        capital A's, one complete limerick of uncertain appropriateness, and a troublingly
        coherent legal brief.
      aliases: [manuscripts, manuscript, papers, paper, stack]
      obvious: true

    - name: banana peel __hash_suffix__
      description: >
        A single banana peel in the middle of the floor. No monkey is currently near it.
        Several monkeys are watching it. Something is about to happen.
      aliases: [peel, banana]

    - name: typewriter ribbon __hash_suffix__
      description: >
        A replacement typewriter ribbon, still in its original packaging from a
        manufacturer that went out of business in 1974. There are approximately
        10,000 more in a nearby closet.
      aliases: [ribbon, ink ribbon]

  # ── THE MANOR GROUNDS ─────────────────────────────────────────────────

  The Manor Grounds:
    - name: stone fountain __hash_suffix__
      description: >
        A large stone fountain at the center of the grounds, its basin depicting Mr. Burns
        standing atop a globe while workers of various nations labor below. The water jets
        from his outstretched hands. It is running even in winter, which takes some
        infrastructure.
      aliases: [fountain, stone fountain, statue fountain]
      obvious: true

    - name: topiary hedge __hash_suffix__
      description: >
        A topiary hedge trimmed into the shape of a smokestack, complete with a trimmed
        smoke plume. The groundskeeper is either very skilled or very afraid.
      aliases: [hedge, topiary, shrub]
      obvious: true
      quantity: 3

    - name: garden bench __hash_suffix__
      description: >
        A wrought iron garden bench positioned beside the fountain, painted black. It is
        cold even in summer and slightly damp even when it has not rained. Sitting on it
        is not comfortable. It was not designed to be.
      aliases: [bench, iron bench, garden bench, wrought iron bench]
      obvious: true
      parent: $furniture

    - name: garden shears __hash_suffix__
      description: >
        A pair of hedge shears resting against the base of a topiary hedge. They are
        very sharp. The person responsible for the topiary does not like to be disturbed
        while working.
      aliases: [shears, hedge shears, scissors, clippers]

    - name: iron gate __hash_suffix__
      description: >
        The main iron gate to Burns Manor, flanked by stone pillars topped with seated
        Dobermans in cast iron. The gate is twelve feet high and currently open —
        when it is closed, the lock requires a key that is not publicly available.
      aliases: [gate, iron gate, front gate, main gate]
      obvious: true

  # ── THE DOBERMAN KENNEL ───────────────────────────────────────────────

  The Doberman Kennel:
    - name: kennel runs __hash_suffix__
      description: >
        A row of individual dog runs lining both walls of the facility, ninety-six
        occupied and one conspicuously empty (Cerberus's run, door open). Each run has
        a nameplate, a water bowl, and a file card with the dog's deployment history.
        The dogs are all watching you. Not barking. Watching.
      aliases: [runs, kennels, cages, kennel]
      obvious: true

    - name: collar board __hash_suffix__
      description: >
        A wooden board with ninety-seven numbered hooks, each labeled with a name.
        Most hooks hold a leather collar with a brass number plate. Three hooks are
        empty. A note below the empty hooks reads: "On assignment — see Mr. S."
      aliases: [board, collar board, collars, hook board]
      obvious: true

