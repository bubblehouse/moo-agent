[ssh]
host = "{host}"
port = {port}
user = "{user}"
password = ""
key_file = ""           # path to private key file; leave empty to use password

[llm]
provider = "bedrock"
model = "us.anthropic.claude-opus-4-6-v1"
aws_region = "us-east-1"
# api_key_env = "ANTHROPIC_API_KEY"   # only needed when provider = "anthropic"

# Example: LM Studio (OpenAI-compatible local server)
# provider = "lm_studio"
# model = "qwen/qwen3-32b"
# base_url = "http://localhost:1234/v1"

[agent]
command_rate_per_second = 1.0       # leaky bucket rate; increase cautiously
memory_window_lines = 50            # lines of short-term memory fed to LLM
# structured_output_retries = 2     # PydanticAI re-ask attempts on schema validation failure (bump to 3 for local models)

# Sampling — omit for provider defaults. Local MoE models (Gemma 4, qwen)
# want these exact values; commercial APIs work well at their defaults.
# temperature = 1.0
# top_p = 0.95
# top_k = 64

# Optional krustylu lore source for the lore_room / lore_character / tag_source
# tools. Disabled by default; enable on world-builder agents that whitelist
# those tools. endpoint is the krustylu MCP URL (behind nginx); verify_tls=false
# accepts the dev snakeoil cert.
# [lore]
# enabled = true
# endpoint = "https://localhost/api/v1/mcp"
# verify_tls = false
# max_lines = 4     # per-section line cap in a brief
# max_chars = 600   # description-summary char cap
